[tmc5160 stepper_x] #motor 0
cs_pin: PC4
interpolate: false
run_current: 2.8
home_current: 2.0
sense_resistor: 0.075
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
#stealthchop_threshold: 0
driver_TPFD: 10                    #for 64 microsteps
driver_PWM_AUTOSCALE: True
driver_PWM_AUTOGRAD: True
driver_PWM_OFS: 28                 #for 64 microsteps
driver_PWM_REG: 5                  #for 64 microsteps
driver_TOFF: 5                     #for 64 microsteps
driver_HSTRT: 6                    #for 64 microsteps
driver_HEND: 2
driver_TBL: 1
high_velocity_threshold: 180000   #for 64 microsteps
coolstep_threshold: 56000         #for 64 microsteps
driver_SEMIN: 6
driver_SEUP: 2
driver_SEMAX: 14
driver_SEDN: 1
driver_SEIMIN: 1
##### 32 microstep settings #####
#driver_TPFD: 6
#driver_PWM_OFS: 22
#driver_PWM_REG: 3
#driver_TOFF: 4
#driver_HSTRT: 4
#high_velocity_threshold: 90000 #if motor stalls at higher velocity 80000
#coolstep_threshold: 28000  #if motor runs hot set to 35000

