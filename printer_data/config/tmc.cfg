[tmc5160 stepper_z]   #motor 2.1 cable mark z1
cs_pin: PC6
interpolate: false
run_current: 1.2
sense_resistor: 0.075
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
stealthchop_threshold: 0
driver_TBL: 2
driver_TOFF: 3
driver_HSTRT: 4
driver_HEND: 2
driver_PWM_AUTOSCALE: True
driver_PWM_AUTOGRAD: True
driver_IHOLDDELAY: 8

# If Z sounds bad, try:
#driver_HSTRT: 5
#driver_HEND: 1

